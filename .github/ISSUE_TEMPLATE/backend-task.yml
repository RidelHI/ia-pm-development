name: Backend task
description: API, domain, security, data, or NestJS architecture work
title: "BE-XX: "
labels: ["type:backend", "agent:backend", "priority:p2"]
body:
  - type: input
    id: parent_pm
    attributes:
      label: Parent PM
      description: PM issue that defines this delivery plan.
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: execution_order
    attributes:
      label: Execution Order
      description: Positive integer that defines sequence across sibling tasks.
      placeholder: "2"
    validations:
      required: true
  - type: input
    id: depends_on
    attributes:
      label: Depends on
      description: Blocking issues that must be closed first. Use `none` when no blockers exist.
      placeholder: "#120, #121 or none"
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What outcome should this task achieve?
      placeholder: Implement endpoint..., enforce guard..., refactor module...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List only in-scope changes.
      placeholder: |
        - API controller changes
        - service logic
        - data repository updates
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Add measurable criteria for done.
      placeholder: |
        - [ ] endpoint returns expected response
        - [ ] invalid payload returns 400
        - [ ] tests updated and passing
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References Consulted
      description: Record docs, MCP tools, and skills consulted before implementation.
      placeholder: |
        - docs/... (Angular/NestJS criteria used)
        - MCP: ... (if used)
        - Skills: backend-nestjs-delivery, nestjs-best-practices, etc.
    validations:
      required: true
