name: PM task
description: Scope definition, prioritization, planning, and delivery coordination
title: "PM-XX: "
labels: ["type:docs", "agent:pm", "priority:p2"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What planning or coordination result is needed?
      placeholder: Define MVP split..., refine backlog..., write delivery ADR...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List work items in scope only.
      placeholder: |
        - issue refinements
        - project workflow updates
        - runbook or ADR updates
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define concrete completion conditions.
      placeholder: |
        - [ ] scope and AC are unambiguous
        - [ ] ownership and priority are defined
        - [ ] project status and docs are updated
    validations:
      required: true
  - type: textarea
    id: execution_plan
    attributes:
      label: Execution Plan (Ordered Subtasks)
      description: Break down implementation into ordered child issues and assign exactly one agent per issue.
      placeholder: |
        1. [ ] #120 agent:backend - API contract and tests
        2. [ ] #121 agent:frontend - UI integration and UX states (depends on #120)
        3. [ ] #122 agent:qa - regression and acceptance evidence (depends on #121)
        4. [ ] #123 agent:release - CI/CD and deployment verification (depends on #122)
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References Consulted
      description: Record docs, MCP sources, and skills used for planning criteria.
      placeholder: |
        - docs/... (workflow and governance references)
        - MCP: ... (if used)
        - Skills: pm-github-orchestrator
    validations:
      required: true
